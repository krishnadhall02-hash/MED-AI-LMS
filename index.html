
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Synapse AI - Medical LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: {
            'samsung': '28px',
          },
          colors: {
            'synapse-deep': '#020617',
            'synapse-dark': '#0a191e',
            'synapse-surface': '#111d27',
            'synapse-elevated': '#1e293b',
            'synapse-border': 'rgba(45, 212, 191, 0.15)',
            'oneui-text-primary': '#f1f5f9',
            'oneui-text-secondary': '#94a3b8',
            'oneui-text-muted': '#64748b',
            'synapse-aqua': '#2dd4bf',
            'synapse-success': '#10b981',
            'synapse-error': '#f87171',
            'synapse-warning': '#fbbf24',
            'oneui-blue': '#2dd4bf',
            'oneui-bg': '#0a191e',
            'oneui-surface': '#111d27',
            'oneui-border': '#1e2d3d'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --safe-area-top: 48px;
      --safe-area-bottom: 32px;
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #000; 
      overflow: hidden;
      color: #f1f5f9;
    }
    .mobile-frame {
      width: 100%;
      max-width: 430px; 
      height: 100vh;
      margin: 0 auto;
      background: linear-gradient(180deg, #0a191e 0%, #020617 100%); 
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }
    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .oneui-header-space { 
      padding-top: 4rem;
      min-height: 25vh; 
    }
    
    .synapse-glass {
      background: rgba(17, 29, 39, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(45, 212, 191, 0.1);
    }
    
    input, select, textarea {
      background-color: #111d27 !important;
      color: #f1f5f9 !important;
      border-color: rgba(45, 212, 191, 0.15) !important;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
      "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
      "recharts": "https://esm.sh/recharts@^3.7.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
