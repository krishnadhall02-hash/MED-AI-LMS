
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MedAI - One UI Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: {
            'samsung': '28px',
          },
          colors: {
            'oneui-blue': '#475569', // Slate 600
            'oneui-bg': '#f4f4f4',   // Light Grey Background
            'oneui-surface': '#ffffff', 
            'oneui-border': '#e0e0e0', 
            'oneui-text-primary': '#212121', 
            'oneui-text-secondary': '#757575',
            'oneui-footer-bg': '#e2e8f0', // Neutral Light-Medium Grey for Footer
            'slate-accent': {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              800: '#1e293b',
              900: '#0f172a'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #000; 
      overflow: hidden;
    }
    .mobile-frame {
      width: 100%;
      max-width: 430px; 
      height: 100vh;
      margin: 0 auto;
      background: #f4f4f4; 
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }
    ::-webkit-scrollbar { display: none; }
    .oneui-header-space { height: 25vh; }
    .tap-target { min-height: 56px; }
    
    .bg-blue-50 { background-color: #f8fafc !important; }
    .text-oneui-blue { color: #475569 !important; }
    .border-oneui-blue { border-color: #475569 !important; }
    .shadow-blue-100 { shadow-color: rgba(71, 85, 105, 0.1) !important; }
    .shadow-blue-200 { shadow-color: rgba(71, 85, 105, 0.2) !important; }
    .shadow-blue-500\/20 { shadow-color: rgba(71, 85, 105, 0.2) !important; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
      "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
      "recharts": "https://esm.sh/recharts@^3.7.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
