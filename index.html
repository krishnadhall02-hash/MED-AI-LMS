
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SYNAPSE MEDPOINT - Medical AI LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: {
            'samsung': '28px',
          },
          colors: {
            'synapse-blue-primary': '#7FA6E8',
            'synapse-blue-secondary': '#5E8FDB',
            'synapse-blue-light': '#f0f9ff',
            'synapse-blue-soft': '#e0f2fe',
            'synapse-text-primary': '#1e293b',
            'synapse-text-secondary': '#475569',
            'synapse-text-muted': '#94a3b8',
            'synapse-border-soft': '#f1f5f9',
            'synapse-card': '#ffffff',
            'synapse-success': '#10b981',
            'synapse-error': '#ef4444',
            'synapse-warning': '#f59e0b',
            // Legacy mappings for compatibility during transition
            'synapse-deep': '#5E8FDB',
            'synapse-dark': '#7FA6E8',
            'synapse-surface': '#ffffff',
            'synapse-aqua': '#7FA6E8',
            'synapse-light-bg': '#f0f9ff',
            'synapse-card-white': '#ffffff',
            'oneui-text-primary': '#1e293b',
            'oneui-text-secondary': '#475569',
            'oneui-text-muted': '#94a3b8',
            'oneui-blue': '#7FA6E8',
            'oneui-bg': '#f0f9ff',
            'oneui-surface': '#ffffff',
            'oneui-border': '#f1f5f9',
            'synapse-text-dark': '#1e293b',
            'synapse-text-muted': '#64748b'
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --safe-area-top: 48px;
      --safe-area-bottom: 32px;
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #f0f9ff; 
      overflow: hidden;
      color: #0f172a;
    }
    .mobile-frame {
      width: 100%;
      max-width: 430px; 
      height: 100vh;
      margin: 0 auto;
      background: linear-gradient(to bottom, #e0f2fe 0%, #bae6fd 50%, #f0f9ff 100%); 
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .oneui-header-space { 
      padding-top: 4rem;
      min-height: 25vh; 
    }
    
    .synapse-glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    input, select, textarea {
      background-color: #ffffff !important;
      color: #0f172a !important;
      border-color: #e2e8f0 !important;
    }
    
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
      "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
      "recharts": "https://esm.sh/recharts@^3.7.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
